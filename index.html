<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Before 2027</title>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600&f[]=satoshi@500,400,700&display=swap" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.149.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05060a;
      --panel: rgba(11, 15, 24, 0.72);
      --panel-strong: rgba(15, 23, 42, 0.88);
      --field: rgba(255, 255, 255, 0.07);
      --ink: #f8fafc;
      --muted: #a6b0c2;
      --soft: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.14);
      --accent: #22d3ee;
      --accent-2: #f472b6;
      --accent-3: #a78bfa;
      --good: #86efac;
      --danger: #fca5a5;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Satoshi", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    ::selection { background: rgba(34, 211, 238, 0.24); }

    .tubes-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(34, 211, 238, 0.2), transparent 32%),
        radial-gradient(circle at 75% 20%, rgba(244, 114, 182, 0.18), transparent 30%),
        #05060a;
    }
    .tubes-bg canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .tubes-vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(5, 6, 10, 0.12), rgba(5, 6, 10, 0.55)),
        radial-gradient(circle at center, transparent 36%, rgba(0, 0, 0, 0.62) 100%);
    }
    .tubes-fallback {
      position: absolute;
      inset: -20%;
      opacity: 0.75;
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(34, 211, 238, 0.32) 43%, transparent 45% 100%),
        linear-gradient(72deg, transparent 0 50%, rgba(244, 114, 182, 0.28) 51%, transparent 53% 100%),
        linear-gradient(145deg, transparent 0 55%, rgba(167, 139, 250, 0.25) 56%, transparent 58% 100%);
      filter: blur(18px);
      animation: driftTubes 14s ease-in-out infinite alternate;
    }
    .tubes-hint {
      position: fixed;
      right: 18px;
      bottom: 16px;
      z-index: 3;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 11px;
      color: rgba(248, 250, 252, 0.72);
      background: rgba(8, 13, 23, 0.54);
      backdrop-filter: blur(14px);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .app-shell {
      min-height: 100vh;
      padding: 18px;
      position: relative;
      z-index: 2;
    }
    .app-frame {
      max-width: 1180px;
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .brand {
      min-width: 0;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    h1, h2, h3 {
      font-family: "Clash Display", "Satoshi", sans-serif;
      letter-spacing: 0;
      margin: 0;
    }
    h1 {
      font-size: clamp(2rem, 7vw, 4.7rem);
      line-height: 0.9;
    }
    h2 {
      font-size: clamp(1.45rem, 4vw, 2.2rem);
      line-height: 1;
    }
    h3 {
      font-size: 1rem;
      line-height: 1.15;
    }
    p { margin: 0; color: var(--muted); line-height: 1.55; }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
    }
    .logout {
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 999px;
      min-height: 38px;
      padding: 0 14px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.78rem;
    }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(1.2);
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .section-body {
      padding: 16px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .segmented {
      display: inline-flex;
      gap: 4px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 4px;
    }
    .segmented button,
    .chip,
    .icon-btn,
    .primary-btn,
    .ghost-btn {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .segmented button {
      padding: 0 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.78rem;
    }
    .segmented button.active {
      background: rgba(34, 211, 238, 0.18);
      color: var(--ink);
      border-color: rgba(34, 211, 238, 0.32);
    }
    .chip {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--line);
      padding: 0 11px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.78rem;
    }
    .chip.active {
      background: rgba(34, 211, 238, 0.16);
      border-color: rgba(34, 211, 238, 0.4);
      color: var(--accent);
    }
    .primary-btn {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.95), rgba(167, 139, 250, 0.95));
      color: #061018;
      border-color: rgba(255, 255, 255, 0.16);
      padding: 0 14px;
      font-weight: 800;
    }
    .ghost-btn {
      background: transparent;
      color: var(--muted);
      border-color: var(--line);
      padding: 0 12px;
      font-weight: 800;
    }
    .danger-btn {
      color: var(--danger);
      border-color: rgba(185, 28, 28, 0.22);
    }
    .icon-btn {
      width: 38px;
      background: transparent;
      border-color: var(--line);
      color: var(--muted);
      font-weight: 900;
    }
    .primary-btn:active,
    .ghost-btn:active,
    .icon-btn:active,
    .chip:active {
      transform: scale(0.98);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    input, textarea, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
      font-size: 0.95rem;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus {
      border-color: rgba(34, 211, 238, 0.72);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.14);
    }
    option { color: #0f172a; }

    .task-list,
    .goal-list,
    .milestone-list {
      display: grid;
      gap: 10px;
    }
    .task-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.72);
      border-radius: 8px;
      padding: 10px;
      animation: rise 0.2s ease;
    }
    .task-row.dragging,
    .milestone.dragging {
      opacity: 0.55;
      outline: 2px dashed rgba(15, 118, 110, 0.4);
    }
    .check {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid var(--accent);
      background: transparent;
      color: #fff;
      margin-top: 4px;
      font-weight: 900;
    }
    .check.done {
      background: var(--accent);
    }
    .task-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .inline-title {
      border: 0;
      background: transparent;
      padding: 4px 0;
      min-height: 30px;
      border-radius: 0;
      color: var(--ink);
      font-weight: 800;
    }
    .inline-title.done {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }
    .task-meta input,
    .task-meta select {
      min-height: 34px;
      padding: 7px 8px;
      font-size: 0.82rem;
      background: rgba(255, 255, 255, 0.07);
    }
    .task-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }
    .mini {
      min-height: 31px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      padding: 0 9px;
      font-size: 0.75rem;
      font-weight: 800;
    }
    .priority {
      width: max-content;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .priority.medium { color: #fde68a; background: rgba(251, 191, 36, 0.16); }
    .priority.low { color: #86efac; background: rgba(34, 197, 94, 0.16); }
    .priority.high { color: #fecaca; background: rgba(248, 113, 113, 0.16); }

    .progress-wrap {
      display: grid;
      gap: 7px;
      min-width: 128px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .progress-track {
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      transition: width 0.3s ease;
    }
    .badge {
      display: inline-grid;
      place-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(134, 239, 172, 0.12);
      color: var(--good);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .goal-card,
    .milestone {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.74);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 11px;
    }
    .goal-card.active {
      border-color: rgba(15, 118, 110, 0.55);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.18);
    }
    .goal-card-head,
    .milestone-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .muted {
      color: var(--muted);
      font-size: 0.86rem;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
    }
    .notice {
      border: 1px solid rgba(34, 211, 238, 0.24);
      background: rgba(34, 211, 238, 0.1);
      color: #cffafe;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.86rem;
      line-height: 1.5;
    }
    .login-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: transparent;
      position: relative;
      z-index: 2;
    }
    .login-panel {
      width: min(100%, 430px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
      display: grid;
      gap: 16px;
      backdrop-filter: blur(24px) saturate(1.2);
    }
    .profile-list {
      display: grid;
      gap: 8px;
    }
    .profile-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
      text-align: left;
    }
    .profile-card.active {
      border-color: var(--accent);
      background: rgba(15, 118, 110, 0.08);
    }

    @media (min-width: 760px) {
      .app-shell { padding: 28px; }
      .home-grid { gap: 20px; }
      .section-header, .section-body { padding: 22px; }
      .field-grid { grid-template-columns: 1.4fr 1fr 0.8fr 0.9fr; align-items: end; }
      .task-row { grid-template-columns: auto minmax(0, 1fr); }
      .task-meta { grid-template-columns: 0.9fr 0.8fr 0.8fr 0.8fr; }
      .roadmap-layout {
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        gap: 14px;
        align-items: start;
      }
    }

    @media (max-width: 520px) {
      .topbar { align-items: flex-start; }
      .profile { align-items: flex-end; flex-direction: column; }
      .section-header { display: grid; }
      .toolbar { width: 100%; }
      .segmented { width: 100%; }
      .segmented button { flex: 1; }
      .task-actions .mini { flex: 1; }
      .task-meta { grid-template-columns: 1fr; }
      .tubes-hint { display: none; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes driftTubes {
      from { transform: translate3d(-4%, -2%, 0) rotate(-2deg) scale(1.02); }
      to { transform: translate3d(4%, 3%, 0) rotate(2deg) scale(1.08); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const STORAGE_PREFIX = "learn_before_2027";
const AVATAR_COLORS = ["#0f766e", "#b45309", "#4338ca", "#be123c", "#15803d", "#334155"];

const storage = {
  get(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch {
      return fallback;
    }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch {}
  },
  keys() {
    try { return Object.keys(localStorage); } catch { return []; }
  }
};

function normalizeUser(user, index = 0) {
  return {
    id: user.id,
    name: user.name || "Learner",
    pin: user.pin || "",
    color: user.color || AVATAR_COLORS[index % AVATAR_COLORS.length],
    createdAt: user.createdAt || (user.created ? new Date(user.created).toISOString() : new Date().toISOString())
  };
}

function loadUsers() {
  const modern = storage.get(`${STORAGE_PREFIX}_users`, []);
  const legacy = storage.get("rmap_users", []);
  const merged = [...modern.map(normalizeUser)];
  legacy.map(normalizeUser).forEach(user => {
    if (!merged.some(existing => existing.id === user.id)) merged.push(user);
  });
  if (merged.length !== modern.length || legacy.length) {
    storage.set(`${STORAGE_PREFIX}_users`, merged);
  }
  return merged;
}

const uid = (prefix = "id") =>
  `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;

const todayISO = () => new Date().toISOString().slice(0, 10);
const addDaysISO = (days) => {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
};
const clamp = (num, min, max) => Math.min(max, Math.max(min, num));
const isToday = (date) => date === todayISO();
const priorityRank = { high: 0, medium: 1, low: 2 };

const defaultTask = (title, days, priority = "medium") => ({
  id: uid("task"),
  title,
  completed: false,
  priority,
  dueDate: addDaysISO(days),
  reminderEnabled: false,
  reminderTime: "09:00",
  snoozedUntil: ""
});

const createMilestone = (title, order, tasks = []) => ({
  id: uid("mile"),
  title,
  order,
  tasks
});

const TEMPLATE_BUILDERS = [
  {
    name: "Learn Python",
    matches: ["learn python", "python", "django", "flask"],
    build(goal) {
      return [
        createMilestone("Python foundations", 1, [
          defaultTask("Set up Python, VS Code, and a virtual environment", 2, "high"),
          defaultTask("Practice variables, types, loops, and functions", 5, "high"),
          defaultTask("Solve 15 beginner problems", 9, "medium")
        ]),
        createMilestone("Practical programming", 2, [
          defaultTask("Learn files, modules, exceptions, and packages", 13, "high"),
          defaultTask("Build a CLI habit tracker", 18, "medium"),
          defaultTask("Read and use one public API", 22, "medium")
        ]),
        createMilestone("Portfolio project", 3, [
          defaultTask("Choose a project with real input and saved output", 28, "high"),
          defaultTask("Write tests for core functions", 34, "medium"),
          defaultTask("Publish code with a README and screenshots", 40, "high")
        ])
      ];
    }
  },
  {
    name: "Fitness",
    matches: ["fitness", "weight loss", "gym", "workout", "running"],
    build(goal) {
      return [
        createMilestone("Baseline and routine", 1, [
          defaultTask("Record current measurements and weekly schedule", 1, "high"),
          defaultTask("Pick three weekly workout slots", 3, "high"),
          defaultTask("Prepare a simple meal plan", 5, "medium")
        ]),
        createMilestone("Consistency block", 2, [
          defaultTask("Complete 8 workouts without missing two in a row", 15, "high"),
          defaultTask("Track sleep, steps, and protein for 14 days", 18, "medium"),
          defaultTask("Adjust routine based on recovery", 22, "medium")
        ]),
        createMilestone("Progress review", 3, [
          defaultTask("Retest strength or endurance baseline", 30, "medium"),
          defaultTask("Update plan for the next month", 32, "high"),
          defaultTask("Celebrate one visible progress marker", 35, "low")
        ])
      ];
    }
  },
  {
    name: "Exam Prep",
    matches: ["exam", "test", "ielts", "sat", "neet", "jee", "upsc", "certification"],
    build(goal) {
      return [
        createMilestone("Syllabus map", 1, [
          defaultTask("Collect syllabus, pattern, dates, and scoring rules", 1, "high"),
          defaultTask("Take a diagnostic test", 3, "high"),
          defaultTask("Rank topics by marks and weakness", 4, "medium")
        ]),
        createMilestone("Study cycles", 2, [
          defaultTask("Finish the first high-weight topic block", 10, "high"),
          defaultTask("Create active-recall notes", 14, "medium"),
          defaultTask("Complete two timed practice sets", 18, "high")
        ]),
        createMilestone("Mock and revise", 3, [
          defaultTask("Take a full mock exam", 24, "high"),
          defaultTask("Review wrong answers and update notes", 26, "high"),
          defaultTask("Run final revision checklist", 30, "medium")
        ])
      ];
    }
  }
];

function generateRoadmap(goal) {
  const haystack = `${goal.title} ${goal.description}`.toLowerCase();
  const template = TEMPLATE_BUILDERS.find(t => t.matches.some(k => haystack.includes(k)));
  if (template) return { source: `Template: ${template.name}`, milestones: template.build(goal) };

  const difficultyMap = { easy: 3, medium: 4, hard: 5 };
  const milestoneCount = difficultyMap[goal.difficulty] || 4;
  const targetDate = goal.deadline ? new Date(goal.deadline) : new Date(Date.now() + 45 * 86400000);
  const daysTotal = Math.max(14, Math.ceil((targetDate - new Date()) / 86400000));
  const baseTitle = goal.title.trim() || "Goal";
  const names = [
    "Clarify outcome and baseline",
    "Build the foundation",
    "Practice with feedback",
    "Ship the first result",
    "Review, refine, and maintain"
  ];
  const tasks = [
    ["Define success metrics", "Collect resources and constraints", "Block recurring work sessions"],
    ["Complete the first learning block", "Make notes from practice", "Remove one blocker"],
    ["Do a realistic practice run", "Ask for feedback or compare examples", "Fix the weakest area"],
    ["Create a usable deliverable", "Test it against the success metric", "Share or archive the result"],
    ["Measure progress", "Plan the next improvement cycle", "Set a maintenance reminder"]
  ];

  return {
    source: "Structured AI fallback",
    milestones: Array.from({ length: milestoneCount }, (_, index) => {
      const startDay = Math.max(1, Math.round((daysTotal / milestoneCount) * index));
      return createMilestone(`${names[index]}: ${baseTitle}`, index + 1, tasks[index].map((title, taskIndex) =>
        defaultTask(title, startDay + taskIndex * 3, taskIndex === 0 ? "high" : "medium")
      ));
    })
  };
}

function progressForTasks(tasks) {
  const total = tasks.length;
  if (!total) return { total: 0, done: 0, pct: 0 };
  const done = tasks.filter(t => t.completed).length;
  return { total, done, pct: Math.round((done / total) * 100) };
}

function getGoalTasks(goal) {
  return goal.roadmap.flatMap(m => m.tasks.map(t => ({ ...t, goalId: goal.id, milestoneId: m.id, goalTitle: goal.title, milestoneTitle: m.title })));
}

function migrateLegacyWorkspace(userId) {
  const legacyTodos = storage.get(`rmap_u${userId}_todos`, []);
  const legacyGoal = storage.get(`rmap_u${userId}_goal`, "");
  const legacyDuration = storage.get(`rmap_u${userId}_duration`, "3 months");
  const durationDays = { "3 months": 90, "6 months": 180, "9 months": 270, "1 year": 365 };
  const standaloneTasks = legacyTodos.map(todo => ({
    id: todo.id || uid("task"),
    title: todo.title || todo.text || "Untitled task",
    completed: Boolean(todo.completed || todo.done),
    priority: todo.priority || "medium",
    dueDate: todo.dueDate || todayISO(),
    reminderEnabled: Boolean(todo.reminderEnabled),
    reminderTime: todo.reminderTime || "09:00",
    snoozedUntil: todo.snoozedUntil || ""
  }));
  const goals = [];

  if (legacyGoal && typeof legacyGoal === "string") {
    const deadline = addDaysISO(durationDays[legacyDuration] || 90);
    const generated = generateRoadmap({
      title: legacyGoal,
      description: `Migrated from the previous goal field. Target duration: ${legacyDuration}.`,
      difficulty: "medium",
      deadline
    });
    goals.push({
      id: uid("goal"),
      title: legacyGoal,
      description: `Migrated from the previous goal field. Target duration: ${legacyDuration}.`,
      difficulty: "medium",
      deadline,
      createdAt: new Date().toISOString(),
      generatorSource: `Migrated / ${generated.source}`,
      roadmap: generated.milestones
    });
  }

  return {
    goals,
    standaloneTasks,
    selectedGoalId: goals[0]?.id || "",
    version: 2
  };
}

function useAutoSave(key, value) {
  useEffect(() => {
    const timer = setTimeout(() => storage.set(key, value), 180);
    return () => clearTimeout(timer);
  }, [key, value]);
}

);

function InteractiveTubesBackground() {
  const canvasRef = useRef(null);
  const sceneRef = useRef(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    let mounted = true;
    let cleanup = () => {};

    const init = async () => {
      if (!canvasRef.current) return;

      try {
        const THREE = window.THREE;
        if (!THREE) throw new Error("Three.js failed to load");
        if (!mounted) return;

        const canvas = canvasRef.current;
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.7));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(0, 0, 18);

        const group = new THREE.Group();
        scene.add(group);

        const ambient = new THREE.AmbientLight("#ffffff", 0.28);
        const keyLight = new THREE.PointLight("#22d3ee", 130, 36);
        const fillLight = new THREE.PointLight("#f472b6", 90, 32);
        keyLight.position.set(-6, 5, 8);
        fillLight.position.set(6, -4, 7);
        scene.add(ambient, keyLight, fillLight);

        const palette = ["#22d3ee", "#f472b6", "#a78bfa", "#67e8f9", "#fb7185"];
        const tubes = Array.from({ length: 24 }, (_, tubeIndex) => {
          const z = -8 + tubeIndex * 0.85;
          const yBase = -5 + Math.random() * 10;
          const points = Array.from({ length: 7 }, (_, pointIndex) => {
            const x = -12 + pointIndex * 4;
            const y = yBase + Math.sin(pointIndex * 0.9 + tubeIndex) * (1.2 + Math.random() * 1.8);
            return new THREE.Vector3(x, y, z + Math.cos(pointIndex + tubeIndex) * 2);
          });
          const curve = new THREE.CatmullRomCurve3(points);
          const geometry = new THREE.TubeGeometry(curve, 112, 0.075 + Math.random() * 0.055, 12, false);
          const glowGeometry = new THREE.TubeGeometry(curve, 112, 0.18 + Math.random() * 0.08, 12, false);
          const color = palette[tubeIndex % palette.length];
          const material = new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0.9
          });
          const glowMaterial = new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity: 0.18,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          });
          const mesh = new THREE.Mesh(geometry, material);
          const glow = new THREE.Mesh(glowGeometry, glowMaterial);
          mesh.userData = {
            speed: 0.35 + Math.random() * 0.45,
            phase: Math.random() * Math.PI * 2,
            baseY: mesh.position.y
          };
          glow.userData = mesh.userData;
          group.add(glow, mesh);
          return { mesh, glow };
        });

        const pointer = { x: 0, y: 0 };
        const resize = () => {
          const { innerWidth, innerHeight } = window;
          renderer.setSize(innerWidth, innerHeight, false);
          camera.aspect = innerWidth / Math.max(1, innerHeight);
          camera.updateProjectionMatrix();
        };
        const onPointerMove = (event) => {
          pointer.x = (event.clientX / Math.max(1, window.innerWidth) - 0.5) * 2;
          pointer.y = (event.clientY / Math.max(1, window.innerHeight) - 0.5) * -2;
        };
        const randomize = () => {
          const colors = randomColors(5);
          tubes.forEach((tube, index) => {
            const color = colors[index % colors.length];
            tube.mesh.material.color.set(color);
            tube.glow.material.color.set(color);
          });
          keyLight.color.set(colors[0]);
          fillLight.color.set(colors[1]);
        };

        let frame = 0;
        const clock = new THREE.Clock();
        const animate = () => {
          if (!mounted) return;
          const elapsed = clock.getElapsedTime();
          group.rotation.y += (pointer.x * 0.32 - group.rotation.y) * 0.035;
          group.rotation.x += (pointer.y * 0.18 - group.rotation.x) * 0.035;
          keyLight.position.x += (pointer.x * 7 - keyLight.position.x) * 0.04;
          keyLight.position.y += (pointer.y * 5 - keyLight.position.y) * 0.04;
          tubes.forEach((tube) => {
            const offset = Math.sin(elapsed * tube.mesh.userData.speed + tube.mesh.userData.phase) * 0.22;
            const twist = Math.sin(elapsed * 0.2 + tube.mesh.userData.phase) * 0.035;
            tube.mesh.position.y = offset;
            tube.glow.position.y = offset;
            tube.mesh.rotation.z = twist;
            tube.glow.rotation.z = twist;
          });
          renderer.render(scene, camera);
          frame = requestAnimationFrame(animate);
        };

        resize();
        window.addEventListener("resize", resize);
        window.addEventListener("pointermove", onPointerMove);
        window.addEventListener("click", randomize);
        frame = requestAnimationFrame(animate);

        sceneRef.current = { renderer, scene, camera, group, tubes };
        setLoaded(true);

        cleanup = () => {
          cancelAnimationFrame(frame);
          window.removeEventListener("resize", resize);
          window.removeEventListener("pointermove", onPointerMove);
          window.removeEventListener("click", randomize);
          tubes.forEach(tube => {
            tube.mesh.geometry.dispose();
            tube.mesh.material.dispose();
            tube.glow.geometry.dispose();
            tube.glow.material.dispose();
          });
          renderer.dispose();
          sceneRef.current = null;
        };
      } catch (error) {
        console.warn("Tubes background fallback active:", error);
      }
    };

    init();
    return () => {
      mounted = false;
      cleanup();
    };
  }, []);

  return (
    <>
      <div className="tubes-bg" aria-hidden="true">
        {!loaded && <div className="tubes-fallback" />}
        <canvas ref={canvasRef} />
        <div className="tubes-vignette" />
      </div>
      <div className="tubes-hint">Move cursor / click for neon shift</div>
    </>
  );
}

function LoginScreen({ onLogin }) {
  const [users, setUsers] = useState(loadUsers);
  const [mode, setMode] = useState(users.length ? "select" : "create");
  const [selected, setSelected] = useState(null);
  const [name, setName] = useState("");
  const [pin, setPin] = useState("");
  const [pinConfirm, setPinConfirm] = useState("");
  const [pinInput, setPinInput] = useState("");
  const [error, setError] = useState("");

  const createUser = () => {
    const cleanName = name.trim();
    if (cleanName.length < 2) return setError("Enter at least two characters.");
    if (pin && pin.length < 4) return setError("PIN must be at least four digits.");
    if (pin !== pinConfirm) return setError("PINs do not match.");
    const nextUser = {
      id: uid("user"),
      name: cleanName,
      pin,
      color: AVATAR_COLORS[users.length % AVATAR_COLORS.length],
      createdAt: new Date().toISOString()
    };
    const next = [...users, nextUser];
    storage.set(`${STORAGE_PREFIX}_users`, next);
    storage.set(`${STORAGE_PREFIX}_last_user`, nextUser.id);
    setUsers(next);
    onLogin(nextUser);
  };

  const enter = () => {
    if (!selected) return;
    if (selected.pin && selected.pin !== pinInput) return setError("Incorrect PIN.");
    storage.set(`${STORAGE_PREFIX}_last_user`, selected.id);
    onLogin(selected);
  };

  const deleteUser = (user, event) => {
    event.stopPropagation();
    if (!confirm(`Delete ${user.name}'s profile and local data?`)) return;
    const next = users.filter(u => u.id !== user.id);
    storage.set(`${STORAGE_PREFIX}_users`, next);
    storage.keys().filter(k => k.startsWith(`${STORAGE_PREFIX}_${user.id}_`)).forEach(k => storage.remove(k));
    setUsers(next);
    if (selected?.id === user.id) setSelected(null);
    if (!next.length) setMode("create");
  };

  return (
    <main className="login-shell">
      <section className="login-panel">
        <div>
          <div className="eyebrow">Productivity system</div>
          <h1>Learn Before 2027</h1>
          <p>Goals, roadmaps, tasks, and reminders in one local-first workspace.</p>
        </div>

        {mode === "select" ? (
          <>
            <div className="profile-list">
              {users.map(user => (
                <button className={`profile-card ${selected?.id === user.id ? "active" : ""}`} key={user.id} onClick={() => { setSelected(user); setError(""); }}>
                  <span className="avatar" style={{ background: user.color }}>{user.name.slice(0, 2).toUpperCase()}</span>
                  <span style={{ flex: 1, minWidth: 0 }}>
                    <strong>{user.name}</strong>
                    <span className="muted" style={{ display: "block" }}>{user.pin ? "PIN protected" : "No PIN"}</span>
                  </span>
                  <button className="icon-btn" title="Delete profile" onClick={(event) => deleteUser(user, event)}>x</button>
                </button>
              ))}
            </div>
            {selected?.pin && (
              <label>
                PIN
                <input value={pinInput} onChange={e => setPinInput(e.target.value.replace(/\D/g, ""))} onKeyDown={e => e.key === "Enter" && enter()} type="password" autoFocus />
              </label>
            )}
            {error && <div className="notice" style={{ borderColor: "rgba(185,28,28,0.25)", color: "#991b1b", background: "#fee2e2" }}>{error}</div>}
            <div className="toolbar">
              <button className="primary-btn" disabled={!selected} onClick={enter}>Enter workspace</button>
              <button className="ghost-btn" onClick={() => { setMode("create"); setError(""); }}>New profile</button>
            </div>
          </>
        ) : (
          <>
            <label>
              Name
              <input value={name} onChange={e => setName(e.target.value)} placeholder="Your name" autoFocus />
            </label>
            <label>
              Optional PIN
              <input value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ""))} type="password" placeholder="Four digits or more" />
            </label>
            <label>
              Confirm PIN
              <input value={pinConfirm} onChange={e => setPinConfirm(e.target.value.replace(/\D/g, ""))} type="password" />
            </label>
            {error && <div className="notice" style={{ borderColor: "rgba(185,28,28,0.25)", color: "#991b1b", background: "#fee2e2" }}>{error}</div>}
            <div className="toolbar">
              <button className="primary-btn" onClick={createUser}>Create profile</button>
              {users.length > 0 && <button className="ghost-btn" onClick={() => setMode("select")}>Back</button>}
            </div>
          </>
        )}
      </section>
    </main>
  );
}

  );

function RoadmapSection({ goals, selectedGoalId, setSelectedGoalId, onGoalChange, onGoalDelete }) {
  const [drag, setDrag] = useState(null);
  const selectedGoal = goals.find(goal => goal.id === selectedGoalId) || goals[0] || null;

  useEffect(() => {
    if (!selectedGoalId && goals[0]) setSelectedGoalId(goals[0].id);
  }, [goals, selectedGoalId, setSelectedGoalId]);

  const updateGoal = (changes) => selectedGoal && onGoalChange(selectedGoal.id, changes);
  const updateMilestones = (roadmap) => updateGoal({ roadmap: roadmap.map((m, index) => ({ ...m, order: index + 1 })) });
  const changeMilestone = (milestoneId, changes) => updateMilestones(selectedGoal.roadmap.map(m => m.id === milestoneId ? { ...m, ...changes } : m));
  const deleteMilestone = (milestoneId) => updateMilestones(selectedGoal.roadmap.filter(m => m.id !== milestoneId));
  const addMilestone = () => updateMilestones([...selectedGoal.roadmap, createMilestone("New milestone", selectedGoal.roadmap.length + 1, [])]);
  const addTask = (milestoneId) => changeMilestone(milestoneId, {
    tasks: [...selectedGoal.roadmap.find(m => m.id === milestoneId).tasks, defaultTask("New task", 3, "medium")]
  });
  const changeTask = (milestoneId, taskId, changes) => changeMilestone(milestoneId, {
    tasks: selectedGoal.roadmap.find(m => m.id === milestoneId).tasks.map(t => t.id === taskId ? { ...t, ...changes } : t)
  });
  const deleteTask = (milestoneId, taskId) => changeMilestone(milestoneId, {
    tasks: selectedGoal.roadmap.find(m => m.id === milestoneId).tasks.filter(t => t.id !== taskId)
  });

  const moveMilestone = (fromId, toId) => {
    if (fromId === toId) return;
    const roadmap = [...selectedGoal.roadmap];
    const fromIndex = roadmap.findIndex(m => m.id === fromId);
    const toIndex = roadmap.findIndex(m => m.id === toId);
    if (fromIndex < 0 || toIndex < 0) return;
    const [moved] = roadmap.splice(fromIndex, 1);
    roadmap.splice(toIndex, 0, moved);
    updateMilestones(roadmap);
  };

  const moveTask = (payload, targetMilestoneId, targetTaskId = null) => {
    const roadmap = selectedGoal.roadmap.map(m => ({ ...m, tasks: [...m.tasks] }));
    const fromMilestone = roadmap.find(m => m.id === payload.milestoneId);
    const toMilestone = roadmap.find(m => m.id === targetMilestoneId);
    if (!fromMilestone || !toMilestone) return;
    const fromIndex = fromMilestone.tasks.findIndex(t => t.id === payload.taskId);
    if (fromIndex < 0) return;
    const [task] = fromMilestone.tasks.splice(fromIndex, 1);
    const toIndex = targetTaskId ? toMilestone.tasks.findIndex(t => t.id === targetTaskId) : toMilestone.tasks.length;
    toMilestone.tasks.splice(toIndex < 0 ? toMilestone.tasks.length : toIndex, 0, task);
    updateMilestones(roadmap);
  };

  const selectedTasks = selectedGoal ? getGoalTasks(selectedGoal) : [];
  const selectedProgress = progressForTasks(selectedTasks);

  return (
    <section className="section">
      <div className="section-header">
        <div>
          <div className="eyebrow">3. Editable plan</div>
          <h2>Roadmap</h2>
          <p>Inline editing, drag reorder, task sync, and progress tracking.</p>
        </div>
        {selectedGoal && (
          <div className="progress-wrap">
            <div className="progress-label"><span>Goal</span><strong>{selectedProgress.pct}%</strong></div>
            <div className="progress-track"><div className="progress-fill" style={{ width: `${selectedProgress.pct}%` }} /></div>
          </div>
        )}
      </div>
      <div className="section-body">
        {!goals.length ? (
          <div className="empty">Create a goal above to generate a structured roadmap.</div>
        ) : (
          <div className="roadmap-layout">
            <div className="goal-list">
              {goals.map(goal => {
                const progress = progressForTasks(getGoalTasks(goal));
                return (
                  <div className={`goal-card ${goal.id === selectedGoal?.id ? "active" : ""}`} key={goal.id}>
                    <div className="goal-card-head">
                      <button className="ghost-btn" style={{ textAlign: "left", height: "auto", padding: 0, border: 0, background: "transparent", color: "inherit", flex: 1 }} onClick={() => setSelectedGoalId(goal.id)}>
                        <h3>{goal.title}</h3>
                        <span className="muted">{goal.difficulty} / due {goal.deadline || "not set"}</span>
                      </button>
                      {progress.pct === 100 && <span className="badge">Complete</span>}
                    </div>
                    <div className="progress-track"><div className="progress-fill" style={{ width: `${progress.pct}%` }} /></div>
                    <div className="toolbar">
                      <button className="mini" onClick={() => setSelectedGoalId(goal.id)}>Edit</button>
                      <button className="mini danger-btn" onClick={() => onGoalDelete(goal.id)}>Delete</button>
                    </div>
                  </div>
                );
              })}
            </div>

            {selectedGoal && (
              <div>
                <div className="goal-card" style={{ marginBottom: 12 }}>
                  <label>
                    Goal title
                    <input value={selectedGoal.title} onChange={e => updateGoal({ title: e.target.value })} />
                  </label>
                  <label>
                    Description
                    <textarea value={selectedGoal.description} onChange={e => updateGoal({ description: e.target.value })} />
                  </label>
                  <div className="task-meta">
                    <label>
                      Difficulty
                      <select value={selectedGoal.difficulty} onChange={e => updateGoal({ difficulty: e.target.value })}>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                      </select>
                    </label>
                    <label>
                      Deadline
                      <input type="date" value={selectedGoal.deadline || ""} onChange={e => updateGoal({ deadline: e.target.value })} />
                    </label>
                    <div className="notice">{selectedGoal.generatorSource}</div>
                  </div>
                </div>

                <div className="toolbar" style={{ marginBottom: 12 }}>
                  <button className="primary-btn" onClick={addMilestone}>Add milestone</button>
                </div>

                <div className="milestone-list">
                  {selectedGoal.roadmap.map(milestone => {
                    const mProgress = progressForTasks(milestone.tasks);
                    return (
                      <div
                        className={`milestone ${drag?.milestoneId === milestone.id && drag.type === "milestone" ? "dragging" : ""}`}
                        key={milestone.id}
                        draggable
                        onDragStart={() => setDrag({ type: "milestone", milestoneId: milestone.id })}
                        onDragOver={e => e.preventDefault()}
                        onDrop={() => {
                          if (drag?.type === "milestone") moveMilestone(drag.milestoneId, milestone.id);
                          if (drag?.type === "task") moveTask(drag, milestone.id);
                          setDrag(null);
                        }}
                        onDragEnd={() => setDrag(null)}
                      >
                        <div className="milestone-head">
                          <div style={{ flex: 1 }}>
                            <input className="inline-title" value={milestone.title} onChange={e => changeMilestone(milestone.id, { title: e.target.value })} />
                            <div className="progress-label"><span>Milestone {milestone.order}</span><strong>{mProgress.done}/{mProgress.total} / {mProgress.pct}%</strong></div>
                          </div>
                          {mProgress.pct === 100 && <span className="badge">Done</span>}
                        </div>
                        <div className="progress-track"><div className="progress-fill" style={{ width: `${mProgress.pct}%` }} /></div>
                        <div className="task-list">
                          {milestone.tasks.map(task => (
                            <TaskRow
                              key={task.id}
                              item={{ kind: "roadmap", task, goalTitle: selectedGoal.title, milestoneTitle: milestone.title }}
                              onChange={changes => changeTask(milestone.id, task.id, changes)}
                              onDelete={() => deleteTask(milestone.id, task.id)}
                              onSnooze={() => changeTask(milestone.id, task.id, { snoozedUntil: new Date(Date.now() + 15 * 60000).toISOString() })}
                              dragProps={{
                                onDragStart: (event) => {
                                  event.stopPropagation();
                                  setDrag({ type: "task", milestoneId: milestone.id, taskId: task.id });
                                },
                                onDragOver: e => e.preventDefault(),
                                onDrop: (event) => {
                                  event.stopPropagation();
                                  if (drag?.type === "task") moveTask(drag, milestone.id, task.id);
                                  setDrag(null);
                                },
                                onDragEnd: () => setDrag(null)
                              }}
                            />
                          ))}
                        </div>
                        <div className="toolbar">
                          <button className="mini" onClick={() => addTask(milestone.id)}>Add task</button>
                          <button className="mini danger-btn" onClick={() => deleteMilestone(milestone.id)}>Delete milestone</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </section>
  );
}

function useNotifications(goals, standaloneTasks, updateTask) {
  const [permission, setPermission] = useState(() => window.Notification ? Notification.permission : "unsupported");
  const notifiedKey = `${STORAGE_PREFIX}_notification_log`;

  useEffect(() => {
    if (!("serviceWorker" in navigator)) return;
    if (!["http:", "https:"].includes(window.location.protocol)) return;
    navigator.serviceWorker.register("./learn-before-sw.js").catch(() => {});
  }, []);

  const notify = async (title, body, tag) => {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    const options = {
      body,
      tag,
      renotify: true,
      actions: [{ action: "snooze", title: "Snooze" }],
      data: { tag }
    };
    try {
      if ("serviceWorker" in navigator && ["http:", "https:"].includes(window.location.protocol)) {
        const reg = await navigator.serviceWorker.ready;
        reg.showNotification(title, options);
      } else {
        new Notification(title, options);
      }
    } catch {
      try { new Notification(title, options); } catch {}
    }
  };

  const allItems = useMemo(() => {
    const roadmap = goals.flatMap(goal => goal.roadmap.flatMap(milestone => milestone.tasks.map(task => ({
      kind: "roadmap",
      goalId: goal.id,
      milestoneId: milestone.id,
      task
    }))));
    return [...roadmap, ...standaloneTasks.map(task => ({ kind: "standalone", task }))];
  }, [goals, standaloneTasks]);

  useEffect(() => {
    const check = () => {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      const log = storage.get(notifiedKey, {});
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      const today = todayISO();
      const incompleteItems = allItems.filter(item => !item.task.completed);
      const activeGoals = goals.filter(goal => progressForTasks(getGoalTasks(goal)).pct < 100);

      if (activeGoals.length) {
        const key = `daily_goal_${today}`;
        if (nowMinutes >= 9 * 60 && !log[key]) {
          notify(
            "Daily goal reminder",
            `${activeGoals.length} active goal${activeGoals.length === 1 ? "" : "s"} waiting for progress today.`,
            key
          );
          log[key] = Date.now();
        }
      }

      const urgentIncomplete = incompleteItems.filter(item => item.task.dueDate && item.task.dueDate <= today);
      if (urgentIncomplete.length) {
        const key = `incomplete_alert_${today}`;
        if (nowMinutes >= 18 * 60 && !log[key]) {
          notify(
            "Incomplete task alert",
            `${urgentIncomplete.length} due or overdue task${urgentIncomplete.length === 1 ? "" : "s"} still open.`,
            key
          );
          log[key] = Date.now();
        }
      }

      allItems.forEach(item => {
        const task = item.task;
        if (task.completed || !task.dueDate) return;
        const taskLabel = task.title || "Untitled task";
        if (task.snoozedUntil && new Date(task.snoozedUntil) <= now) {
          const key = `${task.id}_snooze_${task.snoozedUntil}`;
          if (!log[key]) {
            notify("Snoozed task reminder", taskLabel, key);
            log[key] = Date.now();
            updateTask(item, { snoozedUntil: "" });
          }
        }
        if (task.reminderEnabled && task.dueDate === today) {
          const [h, m] = (task.reminderTime || "09:00").split(":").map(Number);
          const reminderMinutes = h * 60 + m;
          const key = `${task.id}_deadline_${task.dueDate}_${task.reminderTime || "09:00"}`;
          if (nowMinutes >= reminderMinutes && !log[key]) {
            notify("Task deadline reminder", taskLabel, key);
            log[key] = Date.now();
          }
        }
        if (task.dueDate < today) {
          const key = `${task.id}_overdue_${today}`;
          if (!log[key]) {
            notify("Overdue task", taskLabel, key);
            log[key] = Date.now();
          }
        }
      });
      storage.set(notifiedKey, log);
    };
    check();
    const timer = setInterval(check, 60000);
    return () => clearInterval(timer);
  }, [allItems, updateTask]);

  const request = async () => {
    if (!("Notification" in window)) return setPermission("unsupported");
    const result = await Notification.requestPermission();
    setPermission(result);
  };

  return {
    permission,
    request,
    status: permission === "granted" ? "Notifications on" : permission === "denied" ? "Notifications blocked" : permission === "unsupported" ? "Notifications unsupported" : "Enable notifications"
  };
}

function MainApp({ currentUser, onLogout }) {
  const dataKey = `${STORAGE_PREFIX}_${currentUser.id}_workspace`;
  const initialWorkspace = storage.get(dataKey, null) || migrateLegacyWorkspace(currentUser.id);
  const [goals, setGoals] = useState(() => initialWorkspace?.goals || []);
  const [standaloneTasks, setStandaloneTasks] = useState(() => initialWorkspace?.standaloneTasks || []);
  const [selectedGoalId, setSelectedGoalId] = useState(() => initialWorkspace?.selectedGoalId || "");

  useAutoSave(dataKey, { goals, standaloneTasks, selectedGoalId, version: 2 });

  const updateGoal = (goalId, changes) => {
    setGoals(prev => prev.map(goal => goal.id === goalId ? { ...goal, ...changes } : goal));
  };
  const deleteGoal = (goalId) => {
    if (!confirm("Delete this goal and its roadmap tasks?")) return;
    setGoals(prev => prev.filter(goal => goal.id !== goalId));
    if (selectedGoalId === goalId) setSelectedGoalId("");
  };
  const updateStandalone = (taskId, changes) => {
    setStandaloneTasks(prev => prev.map(task => task.id === taskId ? { ...task, ...changes } : task));
  };
  const updateRoadmapTask = (goalId, milestoneId, taskId, changes) => {
    setGoals(prev => prev.map(goal => {
      if (goal.id !== goalId) return goal;
      return {
        ...goal,
        roadmap: goal.roadmap.map(milestone => milestone.id === milestoneId ? {
          ...milestone,
          tasks: milestone.tasks.map(task => task.id === taskId ? { ...task, ...changes } : task)
        } : milestone)
      };
    }));
  };
  const updateAnyTask = React.useCallback((item, changes) => {
    if (item.kind === "standalone") updateStandalone(item.task.id, changes);
    if (item.kind === "roadmap") updateRoadmapTask(item.goalId, item.milestoneId, item.task.id, changes);
  }, []);

  const tasksForTodo = useMemo(() => {
    const roadmap = goals.flatMap(goal => goal.roadmap.flatMap(milestone => milestone.tasks.map(task => ({
      kind: "roadmap",
      goalId: goal.id,
      milestoneId: milestone.id,
      task,
      goalTitle: goal.title,
      milestoneTitle: milestone.title
    }))));
    return [...roadmap, ...standaloneTasks.map(task => ({ kind: "standalone", task }))];
  }, [goals, standaloneTasks]);

  const notification = useNotifications(goals, standaloneTasks, updateAnyTask);

  const createGoal = (goal) => {
    setGoals(prev => [goal, ...prev]);
    setSelectedGoalId(goal.id);
  };

  const snoozeTask = (item) => updateAnyTask(item, { snoozedUntil: new Date(Date.now() + 15 * 60000).toISOString() });

  return (
    <main className="app-shell">
      <div className="app-frame">
        <header className="topbar">
          <div className="brand">
            <div className="eyebrow">Goal - Roadmap - Tasks - To-Do</div>
            <h1>Learn Before 2027</h1>
          </div>
          <div className="profile">
            <span className="avatar" style={{ background: currentUser.color }}>{currentUser.name.slice(0, 2).toUpperCase()}</span>
            <button className="logout" onClick={onLogout}>Sign out</button>
          </div>
        </header>

        <div className="home-grid">
          <TodoSection
            tasks={tasksForTodo}
            standaloneTasks={standaloneTasks}
            onTaskChange={updateAnyTask}
            onStandaloneAdd={task => setStandaloneTasks(prev => [task, ...prev])}
            onStandaloneDelete={taskId => setStandaloneTasks(prev => prev.filter(task => task.id !== taskId))}
            onSnooze={snoozeTask}
            notificationStatus={notification.status}
            onRequestNotifications={notification.request}
          />
          <GoalCreator onCreate={createGoal} />
          <RoadmapSection
            goals={goals}
            selectedGoalId={selectedGoalId}
            setSelectedGoalId={setSelectedGoalId}
            onGoalChange={updateGoal}
            onGoalDelete={deleteGoal}
          />
        </div>
      </div>
    </main>
  );
}

function Root() {
  const [currentUser, setCurrentUser] = useState(() => {
    const users = loadUsers();
    const legacyLast = storage.get("rmap_lastUser", null);
    const lastId = storage.get(`${STORAGE_PREFIX}_last_user`, "") || legacyLast?.id || "";
    return users.find(user => user.id === lastId) || null;
  });

  return (
    <>
      <InteractiveTubesBackground />
      {!currentUser ? (
        <LoginScreen onLogin={setCurrentUser} />
      ) : (
        <MainApp currentUser={currentUser} onLogout={() => {
          storage.remove(`${STORAGE_PREFIX}_last_user`);
          setCurrentUser(null);
        }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
