// ── Simple localStorage-based storage (replaces window.storage) ──────────────
const storage = {
  get: (key) => {
    try { const v = localStorage.getItem(key); return v !== null ? { value: v } : null; }
    catch { return null; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, value); } catch {}
  },
};

// ── InfoSection ───────────────────────────────────────────────────────────────
function InfoSection({ label, children, MUTED }) {
  return (
    <div>
      <div style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, marginBottom:"10px",
        fontWeight:"700", fontFamily:"'Satoshi', sans-serif", textTransform:"uppercase" }}>
        {label}
      </div>
      {children}
    </div>
  );
}

// ── Topic Modal ───────────────────────────────────────────────────────────────
function TopicModal({ topic, phase, onClose, dark }) {
  const [info, setInfo]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);

  const BG   = dark ? "#0f0f0f" : "#f2f2f2";
  const INK  = dark ? "#f0f0f0" : "#111111";
  const MUTED= dark ? "#888"    : "#838282";
  const CARD = dark ? "#1a1a1a" : "#ffffff";

  useEffect(() => {
    async function load() {
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content:
              `You are a concise beginner-friendly tech mentor. For the skill "${topic}" (in the context of "${phase}" for someone starting from scratch), return ONLY a valid JSON object with NO markdown, no backticks, no explanation. Use this exact structure:
{"what":"2 clear sentences","why":"1 sentence","steps":["Step 1: ...","Step 2: ...","Step 3: ...","Step 4: ..."],"resources":[{"name":"Name","url":"https://url.com","free":true},{"name":"Name","url":"https://url.com","free":true},{"name":"Name","url":"https://url.com","free":false}],"timeEstimate":"e.g. 1-2 weeks at 1hr/day","project":"One specific doable beginner project"}`
            }],
          }),
        });
        const data  = await res.json();
        const text  = data.content.map(b => b.type === "text" ? b.text : "").join("");
        const clean = text.replace(/```json|```/g, "").trim();
        setInfo(JSON.parse(clean));
      } catch(e) {
        setError("Couldn't load details. Please try again.");
      } finally {
        setLoading(false);
      }
    }
    load();
  }, [topic]);

  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:1000,
      background:"rgba(0,0,0,0.75)", backdropFilter:"blur(10px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:"20px",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background:BG, borderRadius:"20px", maxWidth:"560px", width:"100%",
        maxHeight:"88vh", overflowY:"auto", padding:"36px", position:"relative",
        fontFamily:"'Satoshi', sans-serif", boxShadow:"0 40px 80px rgba(0,0,0,0.5)",
        border: dark ? "1px solid rgba(255,255,255,0.08)" : "none",
        animation: "fadeIn 0.2s ease",
      }}>
        <button onClick={onClose} style={{
          position:"absolute", top:"16px", right:"16px",
          background:INK, color:BG, border:"none", borderRadius:"50%",
          width:"32px", height:"32px", cursor:"pointer", fontSize:"18px",
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>×</button>

        <div style={{ fontSize:"10px", letterSpacing:"3px", color:MUTED, marginBottom:"6px", textTransform:"uppercase" }}>{phase}</div>
        <h2 style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"30px", fontWeight:"700",
          margin:"0 0 28px", color:INK, letterSpacing:"-0.04em" }}>{topic}</h2>

        {loading && (
          <div style={{ textAlign:"center", padding:"48px 0" }}>
            <div style={{ width:"32px", height:"32px", border:`3px solid ${dark?"#333":"#e0e0e0"}`,
              borderTopColor:INK, borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 12px" }} />
            <div style={{ fontSize:"11px", letterSpacing:"2px", color:MUTED }}>LOADING...</div>
          </div>
        )}
        {error && <div style={{ color:"#ef4444", fontSize:"14px", padding:"20px 0" }}>{error}</div>}

        {info && (
          <div style={{ display:"flex", flexDirection:"column", gap:"28px", animation:"fadeIn 0.3s ease" }}>
            <InfoSection label="WHAT IT IS" MUTED={MUTED}>
              <p style={{ margin:0, fontSize:"15px", lineHeight:"1.75", color:INK }}>{info.what}</p>
            </InfoSection>
            <InfoSection label="WHY IT MATTERS IN 2025–2027" MUTED={MUTED}>
              <p style={{ margin:0, fontSize:"15px", lineHeight:"1.75", color:INK }}>{info.why}</p>
            </InfoSection>
            <div style={{ background:dark?"#1e1e1e":"#111", color:dark?"#f0f0f0":"#f2f2f2",
              borderRadius:"12px", padding:"16px 20px", display:"flex", alignItems:"center", gap:"14px",
              border: dark?"1px solid rgba(255,255,255,0.08)":"none" }}>
              <span style={{ fontSize:"22px" }}>⏱</span>
              <div>
                <div style={{ fontSize:"10px", letterSpacing:"2px", color:"#888", marginBottom:"3px" }}>TIME ESTIMATE</div>
                <div style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"17px", fontWeight:"700" }}>{info.timeEstimate}</div>
              </div>
            </div>
            <InfoSection label="HOW TO LEARN IT — STEP BY STEP" MUTED={MUTED}>
              <ol style={{ margin:0, padding:"0 0 0 18px", display:"flex", flexDirection:"column", gap:"10px" }}>
                {info.steps.map((step, i) => (
                  <li key={i} style={{ fontSize:"14px", lineHeight:"1.65", color:INK }}>{step}</li>
                ))}
              </ol>
            </InfoSection>
            <InfoSection label="BEST RESOURCES" MUTED={MUTED}>
              <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {info.resources.map((r, i) => (
                  <a key={i} href={r.url} target="_blank" rel="noopener noreferrer" style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"11px 14px", background:CARD,
                    border:`1px solid ${dark?"rgba(255,255,255,0.1)":"#e0e0e0"}`,
                    borderRadius:"10px", textDecoration:"none", color:INK,
                    fontSize:"13px", fontWeight:"600",
                  }}>
                    <span style={{ flex:1 }}>↗ {r.name}</span>
                    <span style={{
                      fontSize:"9px", letterSpacing:"1.5px", padding:"3px 9px", borderRadius:"100px",
                      flexShrink:0, marginLeft:"10px",
                      background: r.free ? (dark?"#f0f0f0":"#111") : "transparent",
                      color:       r.free ? (dark?"#111":"#f2f2f2") : MUTED,
                      border:`1px solid ${r.free?(dark?"#f0f0f0":"#111"):(dark?"rgba(255,255,255,0.2)":"#d0d0d0")}`,
                    }}>{r.free?"FREE":"PAID"}</span>
                  </a>
                ))}
              </div>
            </InfoSection>
            <InfoSection label="PRACTICE PROJECT" MUTED={MUTED}>
              <div style={{ background:dark?"#1e1e1e":"#111", color:dark?"#f0f0f0":"#f2f2f2",
                borderRadius:"12px", padding:"18px", fontSize:"14px", lineHeight:"1.75",
                border:dark?"1px solid rgba(255,255,255,0.08)":"none" }}>
                🛠️ {info.project}
              </div>
            </InfoSection>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [activePhase,  setActivePhase]  = useState(0);
  const [checked,      setChecked]      = useState({});
  const [todos,        setTodos]        = useState([]);
  const [newTodo,      setNewTodo]      = useState("");
  const [goal,         setGoal]         = useState("");
  const [duration,     setDuration]     = useState("6 months");
  const [activeView,   setActiveView]   = useState("roadmap");
  const [activeTopic,  setActiveTopic]  = useState(null);
  const [openCat,      setOpenCat]      = useState(null);
  const [loaded,       setLoaded]       = useState(false);
  const [dark,         setDark]         = useState(false);

  // ── Load from localStorage ────────────────────────────────────────────
  useEffect(() => {
    const r1 = storage.get("rmap2-checked");  if (r1) setChecked(JSON.parse(r1.value));
    const r2 = storage.get("rmap2-todos");    if (r2) setTodos(JSON.parse(r2.value));
    const r3 = storage.get("rmap2-goal");     if (r3) setGoal(r3.value);
    const r4 = storage.get("rmap2-duration"); if (r4) setDuration(r4.value);
    const r5 = storage.get("rmap2-dark");     if (r5) setDark(r5.value === "true");
    setLoaded(true);
  }, []);

  useEffect(() => { if (loaded) storage.set("rmap2-checked", JSON.stringify(checked)); }, [checked, loaded]);
  useEffect(() => { if (loaded) storage.set("rmap2-todos",   JSON.stringify(todos));   }, [todos,   loaded]);

  const saveGoalDuration = (g, d) => {
    storage.set("rmap2-goal", g);
    storage.set("rmap2-duration", d);
  };

  const toggleDark = () => {
    const next = !dark;
    setDark(next);
    storage.set("rmap2-dark", String(next));
    document.body.style.background = next ? "#0d0d0d" : "#f2f2f2";
  };

  // ── Derived stats ─────────────────────────────────────────────────────
  const checkedSkills = Object.entries(checked).filter(([k,v]) => v && k.startsWith("sk-")).length;
  const checkedProjs  = Object.entries(checked).filter(([k,v]) => v && k.startsWith("proj-")).length;
  const doneTodos     = todos.filter(t => t.done).length;
  const overallPct    = Math.round(((checkedSkills + checkedProjs) / (totalSkills + totalProjects)) * 100) || 0;

  // ── Handlers ──────────────────────────────────────────────────────────
  const toggleKey  = (key) => setChecked(p => ({ ...p, [key]: !p[key] }));
  const addTodo    = () => {
    if (!newTodo.trim()) return;
    setTodos(p => [...p, { id: Date.now().toString(), text: newTodo.trim(), done: false }]);
    setNewTodo("");
  };
  const toggleTodo = (id) => setTodos(p => p.map(t => t.id===id ? {...t, done:!t.done} : t));
  const deleteTodo = (id) => setTodos(p => p.filter(t => t.id!==id));

  const phase = PHASES[activePhase];

  // ── Theme ─────────────────────────────────────────────────────────────
  const BG     = dark ? "#0d0d0d" : "#f2f2f2";
  const INK    = dark ? "#f0f0f0" : "#111111";
  const MUTED  = dark ? "#888888" : "#838282";
  const LIGHT  = dark ? "#555555" : "#b6b5b5";
  const CARD   = dark ? "#161616" : "#ffffff";
  const BORDER = dark ? "rgba(255,255,255,0.08)" : "rgba(30,30,30,0.1)";
  const NAV_BG = dark ? "rgba(13,13,13,0.93)"    : "rgba(242,242,242,0.93)";

  const navItems = [
    { key:"roadmap", label:"ROADMAP" },
    { key:"about",   label:"ABOUT" },
    { key:"goals",   label:"GOALS" },
    { key:"todos",   label:`TO-DO${todos.length ? ` (${todos.length})` : ""}` },
  ];

  return (
    <div style={{ minHeight:"100vh", background:BG, fontFamily:"'Satoshi', sans-serif", color:INK, transition:"background 0.3s,color 0.3s" }}>

      {/* ── NAV ── */}
      <nav style={{
        position:"sticky", top:0, zIndex:200, height:"64px",
        background:NAV_BG, backdropFilter:"blur(12px)",
        borderBottom:`1px solid ${BORDER}`,
        display:"flex", alignItems:"center", padding:"0 20px", gap:"10px",
      }}>
        <div style={{ fontFamily:"'Clash Display', sans-serif", fontWeight:"700", fontSize:"18px",
          letterSpacing:"-0.05em", flex:1, color:INK }}>
          LEARN<span style={{ color:MUTED }}>2027</span>
        </div>
        <div style={{ display:"flex", gap:"4px", overflowX:"auto", scrollbarWidth:"none" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setActiveView(n.key)} style={{
              background: activeView===n.key ? INK : "transparent",
              color:      activeView===n.key ? BG  : MUTED,
              border:`1px solid ${activeView===n.key ? INK : "transparent"}`,
              borderRadius:"100px", padding:"6px 13px",
              fontSize:"10px", letterSpacing:"1.5px",
              cursor:"pointer", fontFamily:"'Satoshi', sans-serif", fontWeight:"700",
              transition:"all 0.15s", whiteSpace:"nowrap",
            }}>{n.label}</button>
          ))}
        </div>
        <button onClick={toggleDark} title={dark?"Light mode":"Dark mode"} style={{
          background: dark?"#f0f0f0":"#111", color: dark?"#111":"#f0f0f0",
          border:"none", borderRadius:"100px", padding:"6px 14px",
          cursor:"pointer", fontSize:"14px", flexShrink:0, transition:"all 0.2s",
        }}>{dark ? "☀" : "☽"}</button>
      </nav>

      {/* ── HERO ── */}
      <div style={{ padding:"56px 28px 40px", borderBottom:`1px solid ${BORDER}`, overflow:"hidden" }}>
        <div style={{ position:"relative", display:"inline-block", marginBottom:"24px" }}>
          {["rgba(150,150,150,0.22)","rgba(150,150,150,0.15)","rgba(150,150,150,0.09)","rgba(150,150,150,0.05)"].map((col,i) => (
            <div key={i} style={{
              position:"absolute", top:`${(i+1)*0.04}em`, left:`-${(i+1)*0.04}em`,
              fontFamily:"'Clash Display', sans-serif", fontSize:"clamp(42px,9vw,96px)",
              fontWeight:"700", letterSpacing:"-0.05em", lineHeight:"0.9",
              color:col, pointerEvents:"none", userSelect:"none", whiteSpace:"nowrap",
            }}>LEARN 2027</div>
          ))}
          <div style={{ position:"relative", fontFamily:"'Clash Display', sans-serif",
            fontSize:"clamp(42px,9vw,96px)", fontWeight:"700", letterSpacing:"-0.05em",
            lineHeight:"0.9", color:INK, whiteSpace:"nowrap" }}>LEARN 2027</div>
        </div>

        <div style={{ maxWidth:"480px", marginTop:"8px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px", alignItems:"baseline" }}>
            <span style={{ fontSize:"11px", letterSpacing:"1.5px", color:MUTED }}>
              {checkedSkills} SKILLS · {checkedProjs} PROJECTS · {doneTodos} TODOS DONE
            </span>
            <span style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"22px", fontWeight:"700", letterSpacing:"-0.04em", color:INK }}>
              {overallPct}%
            </span>
          </div>
          <div style={{ height:"3px", background:dark?"#2a2a2a":"#e0e0e0", borderRadius:"2px", overflow:"hidden" }}>
            <div style={{ width:`${overallPct}%`, height:"100%", background:INK, borderRadius:"2px", transition:"width 0.5s ease" }} />
          </div>
        </div>

        {goal && (
          <div style={{ marginTop:"18px", display:"inline-flex", alignItems:"center", gap:"8px",
            background:INK, color:BG, borderRadius:"100px", padding:"8px 18px", fontSize:"13px", fontWeight:"500" }}>
            🎯 <strong>{goal}</strong> · {duration}
          </div>
        )}
      </div>

      {/* ── MAIN ── */}
      <div style={{ maxWidth:"920px", margin:"0 auto", padding:"0 22px 80px" }}>

        {/* ════ ABOUT ════ */}
        {activeView === "about" && (
          <div style={{ paddingTop:"44px", animation:"fadeIn 0.25s ease" }}>
            <div style={{
              background:CARD, border:`1px solid ${BORDER}`, borderRadius:"20px",
              padding:"36px", marginBottom:"28px", position:"relative", overflow:"hidden",
            }}>
              <div style={{ position:"absolute", top:0, left:0, right:0, height:"3px",
                background:"linear-gradient(90deg,#FF6B35,#4ECDC4,#A78BFA,#F59E0B)" }} />
              <div style={{ display:"flex", alignItems:"flex-start", gap:"24px", flexWrap:"wrap" }}>
                <div style={{
                  width:"80px", height:"80px", flexShrink:0,
                  background:dark?"#222":"#e8e8e8", border:`2px solid ${BORDER}`, borderRadius:"18px",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontFamily:"'Clash Display', sans-serif", fontSize:"28px", fontWeight:"700", color:INK,
                }}>AS</div>
                <div style={{ flex:1, minWidth:"220px" }}>
                  <div style={{ fontSize:"10px", letterSpacing:"3px", color:MUTED, marginBottom:"6px" }}>CREATOR & MAINTAINER</div>
                  <h1 style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"clamp(22px,4vw,32px)",
                    fontWeight:"700", letterSpacing:"-0.04em", margin:"0 0 6px", color:INK }}>
                    Avinash Singh Paviya
                  </h1>
                  <div style={{ fontSize:"13px", color:MUTED, marginBottom:"16px" }}>
                    B.TECH · Electrical &amp; Computer Engineering · MITS Gwalior
                  </div>
                  <p style={{ fontSize:"14px", lineHeight:"1.8", color:dark?"#bbb":"#444", margin:0, maxWidth:"560px" }}>
                    I'm Avinash Singh Paviya, an electrical computer engineer pursuing a B.Tech degree at MITS Gwalior.
                    I created this website for my day-to-day daily task performance — tracking skills, projects, and habits
                    as I build my way from ECE fundamentals into full-stack development and beyond.
                  </p>
                </div>
              </div>
            </div>

            <div style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, marginBottom:"14px", fontWeight:"700" }}>
              FIND ME ONLINE
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:"10px", marginBottom:"28px" }}>
              {SOCIAL_LINKS.map(s => (
                <a key={s.label} href={s.url} target="_blank" rel="noopener noreferrer"
                  style={{
                    display:"flex", alignItems:"center", gap:"14px",
                    background:CARD, border:`1px solid ${BORDER}`, borderRadius:"14px",
                    padding:"14px 18px", textDecoration:"none", color:INK,
                    transition:"border-color 0.2s, transform 0.15s",
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=INK; e.currentTarget.style.transform="translateY(-1px)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor=BORDER; e.currentTarget.style.transform="translateY(0)"; }}
                >
                  <div style={{ width:"36px", height:"36px", flexShrink:0, background:dark?"#222":"#ebebeb",
                    borderRadius:"10px", display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:"14px", fontWeight:"700", color:INK }}>
                    {s.icon}
                  </div>
                  <div>
                    <div style={{ fontSize:"12px", fontWeight:"700", color:INK }}>{s.label}</div>
                    <div style={{ fontSize:"11px", color:MUTED, marginTop:"1px" }}>{s.handle}</div>
                  </div>
                  <span style={{ marginLeft:"auto", fontSize:"14px", color:LIGHT }}>↗</span>
                </a>
              ))}
            </div>

            <div style={{ display:"flex", gap:"10px", flexWrap:"wrap" }}>
              {[
                { label:"TOTAL SKILLS",   val:totalSkills,   sub:"across 4 phases" },
                { label:"TOTAL PROJECTS", val:totalProjects, sub:"beginner builds" },
                { label:"YOUR PROGRESS",  val:`${overallPct}%`, sub:"completed so far" },
              ].map(s => (
                <div key={s.label} style={{ flex:"1 1 140px", background:CARD, border:`1px solid ${BORDER}`,
                  borderRadius:"14px", padding:"18px 20px", textAlign:"center" }}>
                  <div style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"32px", fontWeight:"700",
                    letterSpacing:"-0.04em", color:INK, lineHeight:1 }}>{s.val}</div>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", color:MUTED, marginTop:"6px", fontWeight:"700" }}>{s.label}</div>
                  <div style={{ fontSize:"11px", color:LIGHT, marginTop:"3px" }}>{s.sub}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ════ ROADMAP ════ */}
        {activeView === "roadmap" && (
          <div style={{ animation:"fadeIn 0.25s ease" }}>
            {/* Phase tabs */}
            <div style={{ display:"flex", gap:"8px", paddingTop:"24px", overflowX:"auto",
              scrollbarWidth:"none", borderBottom:`1px solid ${BORDER}`, paddingBottom:"20px" }}>
              {PHASES.map((p, i) => {
                const done  = p.categories.reduce((acc,cat,ci) => acc+cat.items.filter(item=>checked[`sk-${p.id}-${ci}-${item}`]).length, 0);
                const total = p.categories.reduce((acc,cat) => acc+cat.items.length, 0);
                const pct   = Math.round((done/total)*100);
                const isActive = activePhase===i;
                return (
                  <button key={i} onClick={()=>{ setActivePhase(i); setOpenCat(null); }} style={{
                    background: isActive?INK:CARD, color: isActive?BG:INK,
                    border:`1px solid ${isActive?INK:BORDER}`, borderRadius:"14px",
                    padding:"12px 20px", cursor:"pointer", whiteSpace:"nowrap",
                    fontFamily:"'Satoshi', sans-serif", fontSize:"12px", letterSpacing:"1px", fontWeight:"700",
                    transition:"all 0.15s", display:"flex", flexDirection:"column", alignItems:"flex-start",
                    gap:"6px", minWidth:"120px",
                  }}>
                    <span>{p.label.toUpperCase()}</span>
                    <div style={{ width:"100%", height:"2px", background:isActive?"rgba(255,255,255,0.2)":(dark?"#2a2a2a":"#e0e0e0"), borderRadius:"2px", overflow:"hidden" }}>
                      <div style={{ width:`${pct}%`, height:"100%", background:isActive?BG:p.color, borderRadius:"2px" }} />
                    </div>
                    <span style={{ fontSize:"10px", opacity:0.65 }}>{done}/{total} done</span>
                  </button>
                );
              })}
            </div>

            {/* Phase header */}
            <div style={{ margin:"20px 0 16px", padding:"28px", background:CARD,
              border:`1px solid ${BORDER}`, borderLeft:`4px solid ${phase.color}`, borderRadius:"16px" }}>
              <div style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, marginBottom:"6px" }}>{phase.duration}</div>
              <h2 style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"26px", fontWeight:"700",
                margin:"0 0 8px", letterSpacing:"-0.04em", color:INK }}>{phase.title} — {phase.label}</h2>
              <p style={{ margin:0, color:MUTED, fontSize:"14px", lineHeight:"1.65" }}>{phase.description}</p>
            </div>

            {/* Categories */}
            <div style={{ display:"flex", flexDirection:"column", gap:"10px", marginBottom:"28px" }}>
              {phase.categories.map((cat, ci) => {
                const catKey = `ph${phase.id}-ci${ci}`;
                const isOpen = openCat===catKey;
                const catDone = cat.items.filter(item=>checked[`sk-${phase.id}-${ci}-${item}`]).length;
                return (
                  <div key={ci} style={{ background:CARD, border:`1px solid ${isOpen?INK:BORDER}`,
                    borderRadius:"14px", overflow:"hidden", transition:"border-color 0.2s" }}>
                    <button onClick={()=>setOpenCat(isOpen?null:catKey)} style={{
                      width:"100%", background:"none", border:"none", padding:"16px 20px",
                      display:"flex", alignItems:"center", gap:"12px", cursor:"pointer", textAlign:"left",
                    }}>
                      <span style={{ fontFamily:"'Clash Display', sans-serif", fontWeight:"700", fontSize:"15px",
                        letterSpacing:"-0.02em", flex:1, color:INK }}>{cat.name}</span>
                      <span style={{ fontSize:"11px", color:MUTED, fontFamily:"monospace",
                        background:dark?"#222":"#f2f2f2", padding:"3px 10px", borderRadius:"20px" }}>
                        {catDone}/{cat.items.length}
                      </span>
                      <div style={{ width:"24px", height:"24px", background:isOpen?INK:"transparent",
                        border:`1px solid ${isOpen?INK:LIGHT}`, borderRadius:"50%",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        color:isOpen?BG:LIGHT, fontSize:"11px", transition:"all 0.2s", flexShrink:0,
                        transform:isOpen?"rotate(180deg)":"rotate(0deg)" }}>▾</div>
                    </button>

                    {isOpen && (
                      <div style={{ borderTop:`1px solid ${BORDER}`, padding:"16px 20px",
                        display:"flex", flexWrap:"wrap", gap:"8px" }}>
                        {cat.items.map((item, ii) => {
                          const key   = `sk-${phase.id}-${ci}-${item}`;
                          const isDone = checked[key];
                          return (
                            <div key={ii} style={{
                              display:"flex", alignItems:"stretch",
                              border:`1px solid ${isDone?INK:(dark?"rgba(255,255,255,0.15)":"#e0e0e0")}`,
                              borderRadius:"9px", overflow:"hidden",
                              background:isDone?INK:"transparent", transition:"all 0.15s",
                            }}>
                              <button onClick={()=>toggleKey(key)} title="Mark as done" style={{
                                background:"transparent", border:"none",
                                borderRight:`1px solid ${isDone?"#333":(dark?"rgba(255,255,255,0.1)":"#e0e0e0")}`,
                                padding:"7px 10px", cursor:"pointer",
                                color:isDone?"#aaa":LIGHT, fontSize:"11px",
                                display:"flex", alignItems:"center",
                              }}>{isDone?"✓":"○"}</button>
                              <button onClick={()=>setActiveTopic({name:item, phase:phase.label})} title={`Learn ${item}`} style={{
                                background:"transparent", border:"none", padding:"7px 12px 7px 10px",
                                cursor:"pointer", color:isDone?BG:INK,
                                fontSize:"13px", fontFamily:"'Satoshi', sans-serif", fontWeight:"600",
                                display:"flex", alignItems:"center", gap:"5px",
                              }}>
                                {item}
                                <span style={{ color:isDone?"#888":LIGHT, fontSize:"10px" }}>↗</span>
                              </button>
                            </div>
                          );
                        })}
                        <div style={{ width:"100%", marginTop:"8px", fontSize:"11px", color:MUTED }}>
                          ↗ Click any skill name to see how to learn it + resources
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Projects */}
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"14px" }}>
                <div style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, fontWeight:"700", flex:1 }}>
                  BEGINNER PROJECTS FOR {phase.label.toUpperCase()}
                </div>
                <div style={{ fontSize:"11px", color:MUTED, fontFamily:"monospace" }}>
                  {phase.projects.filter(p=>checked[`proj-${p.id}`]).length}/{phase.projects.length}
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                {phase.projects.map(proj => {
                  const key    = `proj-${proj.id}`;
                  const isDone = checked[key];
                  return (
                    <div key={proj.id} onClick={()=>toggleKey(key)} style={{
                      background:isDone?INK:CARD, color:isDone?BG:INK,
                      border:`1px solid ${isDone?INK:BORDER}`, borderRadius:"14px",
                      padding:"18px 22px", display:"flex", gap:"16px", alignItems:"flex-start",
                      cursor:"pointer", transition:"all 0.2s",
                    }}>
                      <div style={{ width:"22px", height:"22px", flexShrink:0,
                        border:`2px solid ${isDone?BG:INK}`, borderRadius:"50%",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:"11px", fontWeight:"700", marginTop:"2px",
                        background:isDone?"rgba(255,255,255,0.15)":"transparent" }}>
                        {isDone?"✓":""}
                      </div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontFamily:"'Clash Display', sans-serif", fontWeight:"700", fontSize:"15px",
                          letterSpacing:"-0.02em", marginBottom:"5px",
                          textDecoration:isDone?"line-through":"none", opacity:isDone?0.7:1 }}>
                          {proj.title}
                        </div>
                        <div style={{ fontSize:"13px", lineHeight:"1.6", opacity:isDone?0.55:0.75 }}>{proj.desc}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Nav buttons */}
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:"36px" }}>
              {activePhase > 0 ? (
                <button onClick={()=>setActivePhase(activePhase-1)} style={{
                  background:"transparent", border:`1px solid ${BORDER}`, color:MUTED,
                  borderRadius:"100px", padding:"10px 22px", cursor:"pointer",
                  fontSize:"12px", letterSpacing:"1px", fontFamily:"'Satoshi', sans-serif", fontWeight:"700",
                }}>← PREV</button>
              ) : <div />}
              {activePhase < PHASES.length-1 && (
                <button onClick={()=>setActivePhase(activePhase+1)} style={{
                  background:INK, border:"none", color:BG, borderRadius:"100px", padding:"10px 22px",
                  cursor:"pointer", fontSize:"12px", letterSpacing:"1px",
                  fontFamily:"'Satoshi', sans-serif", fontWeight:"700",
                }}>NEXT PHASE →</button>
              )}
            </div>
          </div>
        )}

        {/* ════ GOALS ════ */}
        {activeView === "goals" && (
          <div style={{ paddingTop:"36px", animation:"fadeIn 0.25s ease" }}>
            <div style={{ fontSize:"10px", letterSpacing:"3px", color:MUTED, marginBottom:"8px" }}>YOUR NORTH STAR</div>
            <h2 style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"34px", fontWeight:"700",
              letterSpacing:"-0.05em", margin:"0 0 6px", color:INK }}>Learning Goals</h2>
            <p style={{ color:MUTED, marginBottom:"36px", fontSize:"14px" }}>
              Define what you want to achieve and when. This keeps you focused.
            </p>
            <div style={{ display:"flex", flexDirection:"column", gap:"24px", maxWidth:"520px" }}>
              <div>
                <label style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, display:"block", marginBottom:"8px", fontWeight:"700" }}>YOUR GOAL</label>
                <input value={goal} onChange={e=>setGoal(e.target.value)} onBlur={()=>saveGoalDuration(goal,duration)}
                  placeholder="e.g. Get a data analyst job by Dec 2026"
                  style={{ width:"100%", padding:"14px 16px", background:CARD,
                    border:`1px solid ${dark?"rgba(255,255,255,0.15)":"#e0e0e0"}`,
                    borderRadius:"12px", fontSize:"14px", fontFamily:"'Satoshi', sans-serif",
                    color:INK, outline:"none", boxSizing:"border-box" }}
                  onFocus={e=>e.target.style.borderColor=INK}
                />
              </div>
              <div>
                <label style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, display:"block", marginBottom:"10px", fontWeight:"700" }}>TARGET DURATION</label>
                <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
                  {["3 months","6 months","9 months","1 year"].map(d => (
                    <button key={d} onClick={()=>{ setDuration(d); saveGoalDuration(goal,d); }} style={{
                      background:duration===d?INK:CARD, color:duration===d?BG:INK,
                      border:`1px solid ${duration===d?INK:(dark?"rgba(255,255,255,0.15)":"#e0e0e0")}`,
                      borderRadius:"100px", padding:"9px 18px", fontSize:"13px", cursor:"pointer",
                      fontFamily:"'Satoshi', sans-serif", fontWeight:"600", transition:"all 0.15s",
                    }}>{d}</button>
                  ))}
                </div>
              </div>
              <div style={{ height:"1px", background:BORDER }} />
              <div>
                <div style={{ fontSize:"10px", letterSpacing:"2.5px", color:MUTED, marginBottom:"20px", fontWeight:"700" }}>PHASE BREAKDOWN</div>
                {PHASES.map((p,i) => {
                  const skillsDone = p.categories.reduce((acc,cat,ci) => acc+cat.items.filter(item=>checked[`sk-${p.id}-${ci}-${item}`]).length, 0);
                  const totalSk    = p.categories.reduce((acc,cat) => acc+cat.items.length, 0);
                  const projsDone  = p.projects.filter(pr=>checked[`proj-${pr.id}`]).length;
                  const total = totalSk+p.projects.length;
                  const done  = skillsDone+projsDone;
                  const pct   = Math.round((done/total)*100)||0;
                  return (
                    <div key={i} style={{ marginBottom:"20px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px", alignItems:"center" }}>
                        <div>
                          <span style={{ fontWeight:"700", fontSize:"14px", color:INK }}>{p.title}</span>
                          <span style={{ color:MUTED, fontSize:"13px" }}> — {p.label}</span>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                          <span style={{ fontFamily:"monospace", fontSize:"11px", color:MUTED }}>{done}/{total}</span>
                          <span style={{ fontFamily:"'Clash Display', sans-serif", fontWeight:"700", fontSize:"15px",
                            color:pct===100?p.color:INK }}>{pct}%</span>
                        </div>
                      </div>
                      <div style={{ height:"4px", background:dark?"#2a2a2a":"#e8e8e8", borderRadius:"2px", overflow:"hidden" }}>
                        <div style={{ width:`${pct}%`, height:"100%", background:pct===100?p.color:INK,
                          borderRadius:"2px", transition:"width 0.5s ease" }} />
                      </div>
                      <div style={{ display:"flex", gap:"12px", marginTop:"6px", fontSize:"11px", color:LIGHT }}>
                        <span>✓ {skillsDone} skills</span>
                        <span>✓ {projsDone} projects</span>
                        <span style={{ color:MUTED }}>📅 {p.duration}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ════ TODOS ════ */}
        {activeView === "todos" && (
          <div style={{ paddingTop:"36px", animation:"fadeIn 0.25s ease" }}>
            <div style={{ fontSize:"10px", letterSpacing:"3px", color:MUTED, marginBottom:"8px" }}>YOUR LIST</div>
            <h2 style={{ fontFamily:"'Clash Display', sans-serif", fontSize:"34px", fontWeight:"700",
              letterSpacing:"-0.05em", margin:"0 0 6px", color:INK }}>Custom To-Do</h2>
            <p style={{ color:MUTED, marginBottom:"28px", fontSize:"14px" }}>
              Add your own tasks — study sessions, projects, deadlines, or daily habits.
            </p>
            <div style={{ display:"flex", gap:"8px", marginBottom:"24px" }}>
              <input value={newTodo} onChange={e=>setNewTodo(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addTodo()}
                placeholder="Add a task and press Enter…"
                style={{ flex:1, padding:"13px 16px", background:CARD,
                  border:`1px solid ${dark?"rgba(255,255,255,0.15)":"#e0e0e0"}`,
                  borderRadius:"12px", fontSize:"14px", fontFamily:"'Satoshi', sans-serif",
                  color:INK, outline:"none" }}
              />
              <button onClick={addTodo} style={{ background:INK, color:BG, border:"none",
                borderRadius:"12px", padding:"0 20px", cursor:"pointer", fontSize:"22px", lineHeight:1 }}>+</button>
            </div>
            <div style={{ display:"flex", gap:"10px", marginBottom:"20px" }}>
              {[{label:"TOTAL",val:todos.length,accent:false},{label:"DONE",val:doneTodos,accent:true},{label:"LEFT",val:todos.length-doneTodos,accent:false}].map(s => (
                <div key={s.label} style={{ background:s.accent?INK:CARD, color:s.accent?BG:INK,
                  border:`1px solid ${s.accent?INK:BORDER}`, borderRadius:"12px",
                  padding:"14px 16px", flex:1, textAlign:"center" }}>
                  <div style={{ fontFamily:"'Clash Display', sans-serif", fontWeight:"700", fontSize:"26px", letterSpacing:"-0.04em" }}>{s.val}</div>
                  <div style={{ fontSize:"9px", letterSpacing:"2px", opacity:0.6, marginTop:"2px" }}>{s.label}</div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
              {todos.length===0 && (
                <div style={{ textAlign:"center", padding:"48px 0", color:LIGHT, fontSize:"14px",
                  border:`1px dashed ${BORDER}`, borderRadius:"14px" }}>
                  No tasks yet — add one above 👆
                </div>
              )}
              {todos.map(todo => (
                <div key={todo.id} style={{ display:"flex", alignItems:"center", gap:"12px",
                  background:CARD, border:`1px solid ${BORDER}`, borderRadius:"12px",
                  padding:"13px 16px", opacity:todo.done?0.6:1, transition:"opacity 0.2s" }}>
                  <button onClick={()=>toggleTodo(todo.id)} style={{ width:"22px", height:"22px", flexShrink:0,
                    border:`2px solid ${todo.done?INK:LIGHT}`, borderRadius:"50%",
                    background:todo.done?INK:"transparent", cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    color:BG, fontSize:"11px", fontWeight:"700" }}>
                    {todo.done?"✓":""}
                  </button>
                  <span style={{ flex:1, fontSize:"14px", textDecoration:todo.done?"line-through":"none",
                    color:todo.done?MUTED:INK }}>{todo.text}</span>
                  <button onClick={()=>deleteTodo(todo.id)} style={{ background:"none", border:"none",
                    color:LIGHT, cursor:"pointer", fontSize:"18px", lineHeight:1 }}>×</button>
                </div>
              ))}
            </div>
            {doneTodos>0 && (
              <button onClick={()=>setTodos(p=>p.filter(t=>!t.done))} style={{ marginTop:"16px",
                background:"none", border:`1px solid ${BORDER}`, borderRadius:"100px",
                padding:"8px 18px", fontSize:"11px", letterSpacing:"1.5px", color:MUTED,
                cursor:"pointer", fontFamily:"'Satoshi', sans-serif", fontWeight:"700" }}>
                CLEAR COMPLETED
              </button>
            )}
          </div>
        )}
      </div>

      {/* ── Footer ── */}
      <div style={{ borderTop:`1px solid ${BORDER}`, padding:"24px 28px",
        display:"flex", justifyContent:"space-between", alignItems:"center",
        flexWrap:"wrap", gap:"12px", fontSize:"10px", letterSpacing:"2px", color:LIGHT }}>
        <span>FOCUS · BUILD · SHIP · REPEAT</span>
        <span style={{ color:MUTED }}>
          Built by{" "}
          <a href="https://github.com/avinashsingh1095" target="_blank" rel="noopener noreferrer"
            style={{ color:INK, textDecoration:"none", fontWeight:"700" }}>
            Avinash Singh Paviya
          </a>
          {" "}· MITS Gwalior
        </span>
        <span style={{ fontFamily:"monospace" }}>{overallPct}% COMPLETE</span>
      </div>

      {/* ── Topic Modal ── */}
      {activeTopic && (
        <TopicModal
          topic={activeTopic.name}
          phase={activeTopic.phase}
          onClose={()=>setActiveTopic(null)}
          dark={dark}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
